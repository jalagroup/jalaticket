name: jalasupport
description: Jala Support Ticketing System
version: 1.1.0+33

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  get: ^4.6.6

  # Routing
  go_router: ^14.0.0
  
  # Supabase
  supabase_flutter: ^2.3.4
  
  # HTTP requests
  http: ^1.1.0
  
  # Notifications
  flutter_local_notifications: ^17.2.3
  
  # Internationalization
  intl: any
  
  # UI Components
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  
  # Utils
  uuid: ^4.2.1
  path_provider: ^2.1.1
  flutter_localizations:
    sdk: flutter
  image_picker: ^1.2.0
  file_picker: ^10.3.3
  permission_handler: ^12.0.1
  
  # Firebase - Updated to compatible versions
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  
  # Crypto for FCM
  pointycastle: ^3.7.3
  crypto: ^3.0.3
  googleapis_auth: ^1.0.0
  photo_view: ^0.15.0
  fl_chart: ^0.69.0
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^12.0.1
  connectivity_plus: ^7.0.0
  audioplayers: ^6.1.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  sensors_plus: ^4.0.2
  flutter_web_plugins:
    sdk: flutter

  # Web APIs (for custom web file picker)
  web: ^1.1.0

  # Excel import/export for bulk operations
  excel: ^4.0.6

  # Custom Complaints module
  qr_flutter: ^4.1.0
  flex_color_picker: ^3.7.0
  flutter_quill: ^11.0.0
  signature: ^5.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: Quicksand
      fonts:
        - asset: assets/fonts/Quicksand-Light.ttf
          weight: 300
        - asset: assets/fonts/Quicksand-Regular.ttf
          weight: 400
        - asset: assets/fonts/Quicksand-Medium.ttf
          weight: 500
        - asset: assets/fonts/Quicksand-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Quicksand-Bold.ttf
          weight: 700
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansArabic-Bold.ttf
          weight: 700

flutter_launcher_icons:
  image_path: "assets/images/logo.png"
  ios: true
  android: true
  remove_alpha_ios: true
  min_sdk_android: 21